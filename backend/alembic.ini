# ==============================================================================
# Alembic Database Migration Configuration
# ==============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Database connection
sqlalchemy.url = postgresql://chestx_admin:chestx_admin@localhost:5432/chestx_agent
[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = DEBUG
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S